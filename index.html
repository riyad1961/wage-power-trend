<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wage Purchase Power</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f4f6;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    min-height:100vh;
    padding:10px;
}

h1{
    text-align:center;
    font-size:28px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:15px;
}

.chart-wrapper{
    width:100%;
    height:78vh;
    background:#fafafa;
    border-radius:16px;
    padding:10px;
    box-sizing:border-box;
}

canvas{
    width:100% !important;
    height:100% !important;
}

.info-box{
    margin-top:20px;
    background:#eef6ff;
    border-radius:16px;
    padding:15px;
}

#yearLabel{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

#values{
    line-height:1.8;
    background:white;
    padding:15px;
    border-radius:12px;
}

@media (max-width:768px){

    h1{
        font-size:22px;
    }

    .chart-wrapper{
        height:82vh;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>Wage Purchase Power</h1>

<p class="subtitle">
Interactive Economic Dashboard
</p>

<div class="chart-wrapper">
<canvas id="chart"></canvas>
</div>

<div class="info-box">

<div id="yearLabel">
1990
</div>

<div id="values"></div>

</div>

</div>

<script>

const years = [1990,2000,2010,2020,2026];

const dataMap = {

"Gold":[100,70,312,482,680],
"Housing":[100,152,180,282,355],
"Wages":[100,137,132,160,171],
"Milk":[100,106,104,88,93],
"Electricity":[100,92,88,76,80],
"USD/ILS":[100,110,68,50,45],
"NASDAQ":[100,185,170,640,920],
"Fruit & Veg":[100,112,105,121,128]

};

let activeIndex = 0;

const verticalLinePlugin = {

id:'verticalLine',

afterDraw(chart){

    const x = chart.scales.x.getPixelForValue(activeIndex);

    const ctx = chart.ctx;

    ctx.save();

    ctx.beginPath();

    ctx.moveTo(x, chart.chartArea.top);

    ctx.lineTo(x, chart.chartArea.bottom);

    ctx.lineWidth = 2;

    ctx.strokeStyle = 'rgba(0,0,0,0.5)';

    ctx.stroke();

    ctx.restore();

}

};

const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {

type:'line',

data:{

labels:years,

datasets:[

{
label:'Gold',
data:dataMap["Gold"],
borderColor:'gold',
borderWidth:3,
tension:0.35
},

{
label:'Housing',
data:dataMap["Housing"],
borderColor:'red',
borderWidth:3,
tension:0.35
},

{
label:'Wages',
data:dataMap["Wages"],
borderColor:'blue',
borderWidth:3,
tension:0.35
},

{
label:'Milk',
data:dataMap["Milk"],
borderColor:'orange',
borderWidth:3,
tension:0.35
},

{
label:'Electricity',
data:dataMap["Electricity"],
borderColor:'purple',
borderWidth:3,
tension:0.35
},

{
label:'USD/ILS',
data:dataMap["USD/ILS"],
borderColor:'green',
borderWidth:3,
tension:0.35
},

{
label:'NASDAQ',
data:dataMap["NASDAQ"],
borderColor:'black',
borderWidth:3,
tension:0.35
},

{
label:'Fruit & Veg',
data:dataMap["Fruit & Veg"],
borderColor:'teal',
borderWidth:3,
tension:0.35
}

]

},

options:{

responsive:true,

maintainAspectRatio:false,

interaction:{
mode:'index',
intersect:false
},

plugins:{

legend:{
position:'top'
},

tooltip:{
enabled:true
}

}

},

plugins:[verticalLinePlugin]

});

const yearLabel = document.getElementById('yearLabel');
const values = document.getElementById('values');

function updateValues(index){

activeIndex = index;

yearLabel.innerHTML = years[index];

let html = '';

for(let key in dataMap){

html += '<b>' + key + '</b>: ' + dataMap[key][index] + '<br>';

}

values.innerHTML = html;

chart.update();

}

ctx.canvas.addEventListener('mousemove', function(e){

const points = chart.getElementsAtEventForMode(
e,
'index',
{intersect:false},
true
);

if(points.length){

updateValues(points[0].index);

}

});

ctx.canvas.addEventListener('touchmove', function(e){

const points = chart.getElementsAtEventForMode(
e,
'index',
{intersect:false},
true
);

if(points.length){

updateValues(points[0].index);

}

});

updateValues(0);

</script>

</body>

</html>
