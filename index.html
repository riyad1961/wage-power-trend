<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wage Purchase Power</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
    min-height:100vh;
    padding:10px;
}

h1{
    text-align:center;
    font-size:28px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:15px;
}

.chart-wrapper{
    width:100%;
    height:78vh;
    background:#111827;
    border-radius:16px;
    padding:10px;
    box-sizing:border-box;
    position:relative;
}

canvas{
    width:100% !important;
    height:100% !important;
}

.tooltip-box{
    position:absolute;
    background:#1e293b;
    color:white;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    pointer-events:none;
    display:none;
    min-width:180px;
    border:1px solid #334155;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.controls{
    margin-top:20px;
    background:#111827;
    padding:15px;
    border-radius:16px;
}

.controls h3{
    margin-top:0;
}

.toggle-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.toggle-item{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
}

label{
    cursor:pointer;
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

@media (max-width:768px){

    h1{
        font-size:22px;
    }

    .chart-wrapper{
        height:82vh;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>Wage Purchase Power</h1>

<p class="subtitle">
Interactive Economic Dashboard
</p>

<div class="chart-wrapper">

<canvas id="chart"></canvas>

<div class="tooltip-box" id="tooltipBox"></div>

</div>

<div class="controls">

<h3>Show / Hide Series</h3>

<div class="toggle-grid" id="toggleGrid"></div>

<button onclick="chart.resetZoom()">
Reset Zoom
</button>

</div>

</div>

<script>

const years = [1990,2000,2010,2020,2026];

const dataMap = {

"Gold":[100,70,312,482,680],
"Housing":[100,152,180,282,355],
"Wages":[100,137,132,160,171],
"Milk":[100,106,104,88,93],
"Electricity":[100,92,88,76,80],
"USD/ILS":[100,110,68,50,45],
"NASDAQ":[100,185,170,640,920],
"Fruit & Veg":[100,112,105,121,128]

};

const colors = {

"Gold":"gold",
"Housing":"red",
"Wages":"#3b82f6",
"Milk":"orange",
"Electricity":"purple",
"USD/ILS":"green",
"NASDAQ":"white",
"Fruit & Veg":"teal"

};

const datasets = [];

for(let key in dataMap){

datasets.push({

label:key,
data:dataMap[key],
borderColor:colors[key],
backgroundColor:colors[key],
borderWidth:3,
tension:0.35

});

}

let activeIndex = 0;

const verticalLinePlugin = {

id:'verticalLine',

afterDraw(chart){

const x = chart.scales.x.getPixelForValue(activeIndex);

const ctx = chart.ctx;

ctx.save();

ctx.beginPath();

ctx.moveTo(x, chart.chartArea.top);

ctx.lineTo(x, chart.chartArea.bottom);

ctx.lineWidth = 2;

ctx.strokeStyle = 'rgba(255,255,255,0.4)';

ctx.stroke();

ctx.restore();

}

};

const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {

type:'line',

data:{
labels:years,
datasets:datasets
},

options:{

responsive:true,

maintainAspectRatio:false,

interaction:{
mode:'index',
intersect:false
},

plugins:{

legend:{
display:false
},

zoom:{

pan:{
enabled:true,
mode:'x'
},

zoom:{
wheel:{
enabled:true
},
pinch:{
enabled:true
},
mode:'x'
}

}

},

scales:{

x:{
ticks:{
color:'white'
}
},

y:{
ticks:{
color:'white'
}
}

}

},

plugins:[verticalLinePlugin]

});

const tooltipBox = document.getElementById('tooltipBox');

function updateTooltip(index, x, y){

activeIndex = index;

let html = '<b>Year: ' + years[index] + '</b><br><br>';

for(let key in dataMap){

html += '<span style="color:' + colors[key] + '">●</span> ';
html += key + ': <b>' + dataMap[key][index] + '</b><br>';

}

tooltipBox.innerHTML = html;

tooltipBox.style.display = 'block';

tooltipBox.style.left = (x + 20) + 'px';

tooltipBox.style.top = (y + 20) + 'px';

chart.update();

}

ctx.canvas.addEventListener('mousemove', function(e){

const points = chart.getElementsAtEventForMode(
e,
'index',
{intersect:false},
true
);

if(points.length){

updateTooltip(
points[0].index,
e.offsetX,
e.offsetY
);

}

});

ctx.canvas.addEventListener('touchmove', function(e){

const touch = e.touches[0];

const rect = ctx.canvas.getBoundingClientRect();

const fakeEvent = {
x:touch.clientX - rect.left,
y:touch.clientY - rect.top
};

const points = chart.getElementsAtEventForMode(
fakeEvent,
'index',
{intersect:false},
true
);

if(points.length){

updateTooltip(
points[0].index,
fakeEvent.x,
fakeEvent.y
);

}

});

const toggleGrid = document.getElementById('toggleGrid');

chart.data.datasets.forEach((ds, index)=>{

const div = document.createElement('div');

div.className = 'toggle-item';

div.innerHTML = `
<label>
<input type="checkbox" checked data-index="${index}">
${ds.label}
</label>
`;

toggleGrid.appendChild(div);

});

toggleGrid.addEventListener('change', function(e){

const index = e.target.dataset.index;

chart.setDatasetVisibility(index, e.target.checked);

chart.update();

});

</script>

</body>

</html>
