<!DOCTYPE html>
<html lang="en">

<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="icon-192.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wage Purchase Power</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f4f6;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    min-height:100vh;
    padding:10px;
}

h1{
    text-align:center;
    font-size:28px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:15px;
}

.chart-wrapper{
    width:100%;
    height:80vh;
    background:white;
    border-radius:16px;
    padding:10px;
    box-sizing:border-box;
    border:1px solid #ddd;
}

canvas{
    width:100% !important;
    height:100% !important;
}

@media (max-width:768px){

    h1{
        font-size:22px;
    }

    .chart-wrapper{
        height:82vh;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>Wage Purchase Power</h1>

<p class="subtitle">
Interactive Economic Dashboard
</p>

<div class="chart-wrapper">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const years = [1990,2000,2010,2020,2026];

let activeIndex = 0;

const verticalLinePlugin = {

id:'verticalLine',

afterDraw(chart){

const x = chart.scales.x.getPixelForValue(activeIndex);

const ctx = chart.ctx;

ctx.save();

ctx.beginPath();

ctx.moveTo(x, chart.chartArea.top);

ctx.lineTo(x, chart.chartArea.bottom);

ctx.lineWidth = 2;

ctx.strokeStyle = 'rgba(0,0,0,0.3)';

ctx.stroke();

ctx.restore();

}

};

const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {

type:'line',

data:{

labels:years,

datasets:[

{
label:'Gold',
data:[100,70,312,482,680],
borderColor:'gold',
borderWidth:3,
tension:0.35
},

{
label:'Housing',
data:[100,152,180,282,355],
borderColor:'red',
borderWidth:3,
tension:0.35
},

{
label:'Wages',
data:[100,137,132,160,171],
borderColor:'blue',
borderWidth:3,
tension:0.35
},

{
label:'Milk',
data:[100,106,104,88,93],
borderColor:'orange',
borderWidth:3,
tension:0.35
},

{
label:'Electricity',
data:[100,92,88,76,80],
borderColor:'purple',
borderWidth:3,
tension:0.35
},

{
label:'USD/ILS',
data:[100,110,68,50,45],
borderColor:'green',
borderWidth:3,
tension:0.35
},

{
label:'NASDAQ',
data:[100,185,170,640,920],
borderColor:'black',
borderWidth:3,
tension:0.35
},

{
label:'Fruit & Veg',
data:[100,112,105,121,128],
borderColor:'teal',
borderWidth:3,
tension:0.35
}

]

},

options:{

responsive:true,

maintainAspectRatio:false,

interaction:{
mode:'index',
intersect:false
},

plugins:{

legend:{
display:true,
position:'top'
},

tooltip:{
enabled:true,
mode:'index',
intersect:false
}

},

scales:{

x:{
display:true
},

y:{
display:true
}

}

},

plugins:[verticalLinePlugin]

});

chart.data.datasets.forEach((ds, index)=>{

if(
ds.label !== 'Wages' &&
ds.label !== 'Milk'
){

chart.setDatasetVisibility(index, false);

}

});

chart.update();

ctx.canvas.addEventListener('mousemove', function(e){

const points = chart.getElementsAtEventForMode(
e,
'index',
{intersect:false},
true
);

if(points.length){

activeIndex = points[0].index;

chart.update();

}

});

ctx.canvas.addEventListener('touchmove', function(e){

const touch = e.touches[0];

const rect = ctx.canvas.getBoundingClientRect();

const fakeEvent = {
x:touch.clientX - rect.left,
y:touch.clientY - rect.top
};

const points = chart.getElementsAtEventForMode(
fakeEvent,
'index',
{intersect:false},
true
);

if(points.length){

activeIndex = points[0].index;

chart.update();

}

});

</script>

</body>

</html>
